      <div id="persona-list"></div>
    </aside>

    <!-- Main -->
    <main id="main">

      <!-- No persona selected -->
      <div id="empty-state">
        <p class="empty-label">Select an agent</p>
        <div id="empty-persona-list"></div>
      </div>

      <!-- Chat view -->
      <div id="chat-view" style="display:none">
        <div id="chat-header">
          <button id="btn-menu" aria-label="Open menu">☰</button>
          <button id="btn-agent-picker" aria-label="Switch agent" aria-haspopup="listbox">
            <span id="chat-persona-name"></span>
            <span class="picker-chevron">⌄</span>
          </button>
          <div id="agent-picker" role="listbox"></div>
          <div id="chat-header-right">
            <button id="btn-new-conv" title="New conversation">New</button>
            <button id="btn-settings" aria-label="Settings" title="Settings">⚙️</button>
            <div id="settings-menu" class="settings-menu" style="display:none;">
              <div class="settings-group">
                <label for="model-select">Model:</label>
                <select id="model-select">
                  <optgroup label="Claude">
                    <option value="claude-haiku-4-5-20251001" selected>Haiku</option>
                    <option value="claude-sonnet-4-6">Sonnet</option>
                    <option value="claude-opus-4-6">Opus</option>
                  </optgroup>
                  <optgroup label="OpenAI">
                    <option value="gpt-4o-mini">GPT-4o mini</option>
                    <option value="gpt-4o">GPT-4o</option>
                    <option value="gpt-4.1-mini">GPT-4.1 mini</option>
                    <option value="gpt-4.1">GPT-4.1</option>
                    <option value="o4-mini">o4-mini</option>
                  </optgroup>
                </select>
                <span id="provider-badge" style="font-size:0.75em; font-weight:600; color:#fff; background:#666; padding:2px 6px; border-radius:3px; margin-left:6px; vertical-align:middle; display:inline-block;">Claude</span>
              </div>
              <div class="settings-group">
                <label for="error-mode-select">Errors:</label>
                <select id="error-mode-select">
                  <option value="off">Off</option>
                  <option value="debug">Debug</option>
                  <option value="errors">Full</option>
                </select>
              </div>
              <div class="settings-group">
                <label>
                  <input type="checkbox" id="cost-toggle" />
                  <span>Show Cost</span>
                </label>
              </div>
              <div class="settings-group">
                <label>
                  <input type="checkbox" id="style-toggle" />
                  <span>Bubble Style</span>
                </label>
              </div>
            </div>
          </div>
        </div>

        <div id="messages"></div>

        <div id="input-area">
          <div id="file-chips"></div>
          <div id="input-row">
            <button id="btn-attach" title="Attach file">📎</button>
            <input type="file" id="file-input" multiple style="display:none" />
            <textarea id="input" placeholder="Message…" rows="1"></textarea>
            <button id="btn-send">Send</button>
          </div>
        </div>
      </div>

    </main>
  </div>
  <script src="/static/app.js?v=15"></script>
